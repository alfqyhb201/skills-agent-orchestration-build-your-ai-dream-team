<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Project Pulse</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    /* Minimal fallback styles - primary styling in external stylesheet */
    body {
      margin: 0;
      padding: 0
    }

    #error {
      display: none;
      color: #dc2626;
      padding: 1rem;
      margin: 0 1rem;
      background: #fee2e2;
      border-radius: 6px;
      border: 1px solid #fecaca
    }

    #error[hidden="false"] {
      display: block
    }

    .visually-hidden {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0
    }
  </style>
</head>

<body>
  <header>
    <h1>Project Pulse</h1>
  </header>
  <main>
    <div id="error" role="alert" aria-live="assertive" hidden></div>

    <section id="projects" class="dashboard" role="list" aria-label="Project list">
      <!-- Project cards will be rendered here -->
    </section>
  </main>

  <script>
    (function () {
      const list = document.getElementById('projects');
      const err = document.getElementById('error');

      function createCard(project, index) {
        const card = document.createElement('article');
        card.className = 'project-card';
        card.setAttribute('role', 'listitem');
        card.tabIndex = 0; // make focusable

        const detailId = 'project-detail-' + index;
        card.setAttribute('aria-expanded', 'false');
        card.setAttribute('aria-controls', detailId);

        // Header: name and owner in a clean layout
        const header = document.createElement('div');
        header.className = 'card-header';

        const name = document.createElement('h3');
        name.className = 'project-name';
        name.textContent = project.name;
        header.appendChild(name);

        const owner = document.createElement('p');
        owner.className = 'project-owner';
        owner.textContent = project.owner;
        header.appendChild(owner);
        card.appendChild(header);

        // Status and Priority badges in meta section
        const meta = document.createElement('div');
        meta.className = 'card-meta';

        const statusBadge = document.createElement('span');
        statusBadge.className = 'status-badge status-' + project.status;
        statusBadge.textContent = project.status.replace('-', ' ').toUpperCase();
        meta.appendChild(statusBadge);

        const priorityBadge = document.createElement('span');
        priorityBadge.className = 'priority priority-' + project.priority.toLowerCase();
        priorityBadge.textContent = '● ' + project.priority.toUpperCase();
        meta.appendChild(priorityBadge);

        card.appendChild(meta);

        // Recent activity summary (visible)
        const activity = document.createElement('div');
        activity.className = 'project-activity';
        activity.id = detailId + '-summary';
        activity.textContent = project.recentActivity;

        // Hidden details region (expanded on Enter / click)
        const details = document.createElement('div');
        details.className = 'project-details';
        details.id = detailId;
        details.hidden = true;
        details.textContent = project.recentActivity; // duplicated so details are visible when expanded

        card.appendChild(activity);
        card.appendChild(details);

        function toggle() {
          const expanded = card.getAttribute('aria-expanded') === 'true';
          const next = !expanded;
          card.setAttribute('aria-expanded', next ? 'true' : 'false');
          if (next) {
            details.hidden = false;
            card.classList.add('expanded');
          } else {
            details.hidden = true;
            card.classList.remove('expanded');
          }
        }

        // Click and keyboard interaction (Enter toggles expansion)
        card.addEventListener('click', function (e) {
          // Allow clicking anywhere on the card to toggle
          toggle();
        });

        card.addEventListener('keydown', function (e) {
          if (e.key === 'Enter' || e.keyCode === 13) {
            e.preventDefault();
            toggle();
          }
        });

        return card;
      }

      // Fetch project data and render
      fetch('./project-data.json', { cache: 'no-store' })
        .then(function (res) {
          if (!res.ok) throw new Error('Network response was not ok: ' + res.status);
          return res.json();
        })
        .then(function (data) {
          if (!data || !Array.isArray(data.projects)) throw new Error('Invalid data format');
          data.projects.forEach(function (p, i) {
            const c = createCard(p, i);
            list.appendChild(c);
          });
        })
        .catch(function (error) {
          list.innerHTML = '';
          const errorDiv = document.createElement('div');
          errorDiv.id = 'error-state';
          errorDiv.setAttribute('role', 'alert');
          errorDiv.innerHTML = '<strong>خطأ في تحميل المشاريع</strong><br/>Failed to load projects: ' + (error && error.message ? error.message : String(error)) + '<br/><small>تأكد من تشغيل الخادم: python3 -m http.server 8081</small>';
          list.parentElement.insertBefore(errorDiv, list);
        });
    })();
  </script>
</body>

</html>
