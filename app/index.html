<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Project Pulse</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    /* Minimal, non-essential styles so the dashboard is usable even without an external stylesheet */
    body{font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial; margin:0; padding:1rem; background:#f4f4f7}
    header h1{font-size:1.5rem;margin:0 0 1rem}
    #error{color:#a00;margin-bottom:1rem}
    #projects{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:1rem}
    .project-card{background:#fff;border:1px solid #ddd;padding:0.75rem;border-radius:6px;box-shadow:0 1px 2px rgba(0,0,0,0.03);cursor:pointer;outline:none}
    .project-card:focus{box-shadow:0 0 0 3px rgba(0,120,215,0.15)}
    .project-name{font-weight:700;margin-bottom:0.25rem}
    .card-meta{display:flex;gap:0.5rem;font-size:0.9rem;color:#444;margin-bottom:0.5rem;flex-wrap:wrap}
    .project-activity{font-size:0.9rem;color:#333;max-height:3.6rem;overflow:hidden}
    .project-details{margin-top:0.5rem;background:#f9f9fb;padding:0.5rem;border-radius:4px;font-size:0.9rem;color:#222}
    .project-card.expanded .project-activity{max-height:none}
    .visually-hidden{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}
  </style>
</head>
<body>
  <header>
    <h1>Project Pulse</h1>
  </header>
  <main>
    <div id="error" role="alert" aria-live="assertive" hidden></div>

    <section id="projects" role="list" aria-label="Project list">
      <!-- Project cards will be rendered here -->
    </section>
  </main>

  <script>
  (function () {
    const list = document.getElementById('projects');
    const err = document.getElementById('error');

    function createCard(project, index) {
      const card = document.createElement('article');
      card.className = 'project-card';
      card.setAttribute('role', 'listitem');
      card.tabIndex = 0; // make focusable

      const detailId = 'project-detail-' + index;
      card.setAttribute('aria-expanded', 'false');
      card.setAttribute('aria-controls', detailId);

      // Header: name and owner
      const header = document.createElement('div');
      header.className = 'card-header';

      const name = document.createElement('div');
      name.className = 'project-name';
      name.textContent = project.name;
      header.appendChild(name);

      const owner = document.createElement('div');
      owner.className = 'project-owner';
      owner.textContent = 'Owner: ' + project.owner;
      header.appendChild(owner);

      // Meta: status and priority
      const meta = document.createElement('div');
      meta.className = 'card-meta';

      const status = document.createElement('div');
      status.className = 'project-status';
      status.textContent = 'Status: ' + project.status;
      meta.appendChild(status);

      const priority = document.createElement('div');
      priority.className = 'project-priority';
      priority.textContent = 'Priority: ' + project.priority;
      meta.appendChild(priority);

      // Recent activity summary (visible)
      const activity = document.createElement('div');
      activity.className = 'project-activity';
      activity.id = detailId + '-summary';
      activity.textContent = project.recentActivity;

      // Hidden details region (expanded on Enter / click)
      const details = document.createElement('div');
      details.className = 'project-details';
      details.id = detailId;
      details.hidden = true;
      details.textContent = project.recentActivity; // duplicated so details are visible when expanded

      card.appendChild(header);
      card.appendChild(meta);
      card.appendChild(activity);
      card.appendChild(details);

      function toggle() {
        const expanded = card.getAttribute('aria-expanded') === 'true';
        const next = !expanded;
        card.setAttribute('aria-expanded', next ? 'true' : 'false');
        if (next) {
          details.hidden = false;
          card.classList.add('expanded');
        } else {
          details.hidden = true;
          card.classList.remove('expanded');
        }
      }

      // Click and keyboard interaction (Enter toggles expansion)
      card.addEventListener('click', function (e) {
        // Allow clicking anywhere on the card to toggle
        toggle();
      });

      card.addEventListener('keydown', function (e) {
        if (e.key === 'Enter' || e.keyCode === 13) {
          e.preventDefault();
          toggle();
        }
      });

      return card;
    }

    // Fetch project data and render
    fetch('project-data.json', { cache: 'no-store' })
      .then(function (res) {
        if (!res.ok) throw new Error('Network response was not ok: ' + res.status);
        return res.json();
      })
      .then(function (data) {
        if (!data || !Array.isArray(data.projects)) throw new Error('Invalid data format');
        data.projects.forEach(function (p, i) {
          const c = createCard(p, i);
          list.appendChild(c);
        });
      })
      .catch(function (error) {
        list.innerHTML = '';
        err.hidden = false;
        err.textContent = 'Failed to load projects: ' + (error && error.message ? error.message : String(error));
      });
  })();
  </script>
</body>
</html>
